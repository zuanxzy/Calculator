<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sigma Calc" />
    <meta name="theme-color" content="#0a172b" />
    <meta name="description" content="Kalkulator minimalis untuk orang sigma" />

    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="stylesheet" href="style.css" />

    <title>Kalkulator Orang Sigma</title>
  </head>
  <body>
    <main class="calculator" aria-label="Kalkulator Orang Sigma">
      <section class="display" aria-live="polite">
        <div class="expression" id="expression"></div>
        <output class="result" id="result">0</output>
      </section>

      <section class="keys" aria-label="Butang kalkulator">
        <button class="key utility" data-action="clear" type="button">AC</button>
        <button class="key utility" data-action="delete" type="button">DEL</button>
        <button class="key operator" data-value="%" type="button">%</button>
        <button class="key operator" data-value="/" type="button">÷</button>

        <button class="key" data-value="7" type="button">7</button>
        <button class="key" data-value="8" type="button">8</button>
        <button class="key" data-value="9" type="button">9</button>
        <button class="key operator" data-value="*" type="button">×</button>

        <button class="key" data-value="4" type="button">4</button>
        <button class="key" data-value="5" type="button">5</button>
        <button class="key" data-value="6" type="button">6</button>
        <button class="key operator" data-value="-" type="button">−</button>

        <button class="key" data-value="1" type="button">1</button>
        <button class="key" data-value="2" type="button">2</button>
        <button class="key" data-value="3" type="button">3</button>
        <button class="key operator" data-value="+" type="button">+</button>

        <button class="key zero" data-value="0" type="button">0</button>
        <button class="key" data-value="." type="button">.</button>
        <button class="key equals" data-action="calculate" type="button">=</button>
      </section>
    </main>

    <script src="script.js"></script>
    <script>
      // OPTIMASI: Pastikan Service Worker mendaftar selepas page selesai load sepenuhnya
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.error('SW register fail:', err));
        });
      }
    </script>
  </body>
</html>
